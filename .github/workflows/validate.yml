name: Validate Central Registry
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check application
        run: |
          test -s index.html
          test -s styles.css
          test -s config.js
          test -s core.js
          test -s records.js
          test -s access.js
          test -s bootstrap.js
          test -s manifest.webmanifest
          test -s vercel.json
          node --check config.js
          node --check core.js
          node --check records.js
          node --check access.js
          node --check bootstrap.js
          grep -q 'Central Registry Login' index.html
          grep -q 'class="locked"' index.html
          grep -q 'school_registry_admin_read_api' records.js
          grep -q 'school_registry_student_write_api' records.js
          grep -q 'school_registry_staff_write_api' records.js
          grep -q 'school_registry_guardian_write_api' records.js
          grep -q 'school_portal_access_admin_read_api' access.js
          grep -q 'school_portal_access_admin_write_api' access.js
          grep -q 'photoCamera' records.js
          grep -q 'photoGallery' records.js
          if grep -q 'public-live.js' index.html; then echo 'Public live loader must not be used'; exit 1; fi
          if grep -RIn -E 'SUPABASE_SERVICE_ROLE_KEY|service_role_key|sb_secret_' . --exclude-dir=.git; then exit 1; fi
